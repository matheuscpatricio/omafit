# Auditoria de segurança: dependências (npm), padrões no repositório e, opcionalmente,
# Supabase Security Advisors. Veja `scripts/security-audit.mjs`.
name: Security audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Run security audit (repo + optional Supabase)
        env:
          # Opcional: secret com Personal Access Token do Supabase
          # (https://supabase.com/dashboard/account/tokens) e ref do projeto.
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          # Por omissão: só falha com vulnerabilidades critical. Aumente a exigência, por exemplo:
          # AUDIT_MIN_LEVEL: high
        run: npm run security:audit
