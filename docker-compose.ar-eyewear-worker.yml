# Worker AR (Rodin + pós-processo Blender). Na raiz do repo omafit:
#
#   docker compose -f docker-compose.ar-eyewear-worker.yml up --build -d
#
# Para usar só o worker Python (app com AR_MESH_WORKER_EXTERNAL=1):
#   AR_MESH_WORKER_EXTERNAL=1 no Railway/Shopify app
#
# Por defeito a app Shopify gera Rodin no Node quando FAL_API_KEY está definida.

services:
  ar-mesh-generate:
    build:
      context: ./workers/ar-mesh-generate
      dockerfile: Dockerfile.stub
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKER_STUB: ${AR_MESH_WORKER_STUB:-0}
      POLL_SECONDS: ${AR_MESH_WORKER_POLL_SECONDS:-10}
      FAL_API_KEY: ${FAL_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
